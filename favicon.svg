<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Top abacus (slab) -->
  <rect x="8" y="10" width="48" height="5" fill="#0a0a0a"/>
  <!-- Echinus / capital under abacus -->
  <rect x="12" y="17" width="40" height="3" fill="#0a0a0a"/>
  <!-- Volutes (scrolls) — simplified as small filled circles flanking the capital -->
  <circle cx="14" cy="20" r="4" fill="#0a0a0a"/>
  <circle cx="50" cy="20" r="4" fill="#0a0a0a"/>
  <!-- Inner echinus block -->
  <rect x="18" y="22" width="28" height="3" fill="#0a0a0a"/>
  <!-- Column shaft with two flutes (vertical lines) -->
  <rect x="20" y="27" width="24" height="22" fill="#0a0a0a"/>
  <rect x="26" y="29" width="3" height="18" fill="#ffffff"/>
  <rect x="35" y="29" width="3" height="18" fill="#ffffff"/>
  <!-- Base -->
  <rect x="14" y="50" width="36" height="3" fill="#0a0a0a"/>
  <rect x="8" y="55" width="48" height="5" fill="#0a0a0a"/>
</svg>
