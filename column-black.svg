<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="#0a0a0a">
  <!-- Top abacus -->
  <rect x="8" y="10" width="48" height="5"/>
  <!-- Capital -->
  <rect x="12" y="17" width="40" height="3"/>
  <!-- Volutes -->
  <circle cx="14" cy="20" r="4"/>
  <circle cx="50" cy="20" r="4"/>
  <!-- Inner echinus -->
  <rect x="18" y="22" width="28" height="3"/>
  <!-- Shaft as 3 strips with flute gaps between -->
  <rect x="20" y="27" width="6" height="22"/>
  <rect x="29" y="27" width="6" height="22"/>
  <rect x="38" y="27" width="6" height="22"/>
  <!-- Top and bottom edges of shaft (close it off) -->
  <rect x="20" y="27" width="24" height="2"/>
  <rect x="20" y="47" width="24" height="2"/>
  <!-- Base -->
  <rect x="14" y="50" width="36" height="3"/>
  <rect x="8" y="55" width="48" height="5"/>
</svg>